<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>Killer Baccarat OS - Sync Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { min-height: 100vh; font-family: 'Prompt', sans-serif; background-color: #0f172a; color: white; user-select: none; -webkit-tap-highlight-color: transparent; }
        .app-wrapper { display: flex; flex-direction: column; min-height: 100vh; max-width: 1100px; margin: 0 auto; padding: 16px 12px; box-sizing: border-box; gap: 16px; }
        .btn-press:active { transform: scale(0.95); }
        .bead-b { background-color: #ef4444; color: white; font-weight: bold; }
        .bead-p { background-color: #3b82f6; color: white; font-weight: bold; }
        .bead-t { background-color: #22c55e; color: white; font-weight: bold; }
        @keyframes bead-pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .latest-bead { animation: bead-pop 0.2s ease-out; border: 2px solid white; z-index: 10;}
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bead-plate-grid { display: grid; grid-template-rows: repeat(6, 26px); grid-auto-columns: 26px; grid-auto-flow: column; gap: 4px; padding: 4px; }
        .font-sarabun { font-family: 'Sarabun', sans-serif; }
        .fixed-commander-mobile { height: 125px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        @media (min-width: 1024px) { .fixed-commander-mobile { height: 160px; } }
    </style>
</head>
<body class="bg-slate-900 text-white">

<div class="app-wrapper">
    <div class="flex justify-between items-center shrink-0">
        <div class="flex flex-col">
            <h1 class="text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-gray-100 to-gray-400 leading-tight">KILLER OS</h1>
            <span class="text-[10px] md:text-xs text-emerald-400 leading-none mt-1 font-mono">v16.6.30 Sync Debugger</span>
        </div>
        <div class="flex gap-2 bg-slate-800/50 p-1.5 rounded-full shadow-inner border border-slate-700/50">
            <button id="btn-whale1" onclick="setMode('WHALE_V1')" class="px-4 py-2 rounded-full text-[11px] md:text-sm font-semibold text-gray-400 transition-all">🐋 V.1</button>
            <button id="btn-whale2" onclick="setMode('WHALE_V2')" class="px-4 py-2 rounded-full text-[11px] md:text-sm font-semibold text-gray-400 transition-all">🐉 V.2</button>
            <button id="btn-whale3" onclick="setMode('WHALE_V3')" class="px-4 py-2 rounded-full text-[11px] md:text-sm font-semibold text-gray-400 transition-all">🐦‍🔥 V.3</button>
        </div>
    </div>

    <div class="flex flex-col lg:grid lg:grid-cols-12 gap-6 flex-1">
        <div class="lg:col-span-7 flex flex-col gap-6">
            <div id="commander-zone" class="w-full rounded-3xl p-4 md:p-6 border-2 text-center shadow-2xl shrink-0 transition-colors duration-300 bg-slate-800/80 fixed-commander-mobile">
                <div class="flex justify-between items-start w-full">
                    <span id="mode-badge" class="text-xs md:text-sm font-bold px-3 py-1 rounded-lg">Phoenix V.3</span>
                    <div class="flex gap-2 items-center">
                        <span id="market-regime" class="text-[10px] md:text-xs text-gray-400 bg-black/40 px-2 py-1 rounded-md">⚖️ Balanced</span>
                        <span id="system-status" class="text-[10px] md:text-xs text-gray-300 font-medium hidden md:inline-block">✅ พร้อมรบ</span>
                    </div>
                </div>
                <div class="flex items-center justify-center flex-1 w-full">
                    <h2 id="signal-text" class="font-sarabun text-2xl sm:text-3xl md:text-4xl font-bold tracking-normal leading-none text-gray-300 whitespace-nowrap overflow-hidden text-ellipsis w-full">ดูลาดเลา...</h2>
                </div>
            </div>

            <div class="bg-slate-800/60 p-5 md:p-6 rounded-3xl border border-slate-700/50 shadow-md relative">
                <p class="absolute top-4 right-5 text-[9px] md:text-[10px] text-slate-500 font-mono hidden md:block">HOTKEYS: [P]=Player, [T]=Tie, [B]=Banker, [Z]=Undo</p>
                <p class="text-xs md:text-sm text-gray-400 mb-4 font-medium flex items-center">
                    บันทึกผลไพ่ <span id="round-text" class="text-white font-bold ml-2 bg-indigo-600/30 px-3 py-1 rounded-full border border-indigo-500/30">ตาที่ 0</span>
                </p>
                <div class="grid grid-cols-3 gap-3 md:gap-5">
                    <button onclick="recordResult('P')" class="btn-press bg-blue-600 active:bg-blue-700 text-white h-20 md:h-24 rounded-2xl text-4xl font-black shadow-[0_5px_15px_rgba(37,99,235,0.4)] transition-all flex flex-col items-center justify-center">
                        <span class="leading-none">P</span><span class="text-[10px] opacity-50 mt-1 hidden md:block">Key: P</span>
                    </button>
                    <button onclick="recordResult('T')" class="btn-press bg-green-600 active:bg-green-700 text-white h-20 md:h-24 rounded-2xl text-2xl font-bold shadow-[0_5px_15px_rgba(34,197,94,0.4)] transition-all flex flex-col items-center justify-center">
                        <span class="leading-none">TIE</span><span class="text-[10px] opacity-50 mt-1 hidden md:block">Key: T</span>
                    </button>
                    <button onclick="recordResult('B')" class="btn-press bg-red-600 active:bg-red-700 text-white h-20 md:h-24 rounded-2xl text-4xl font-black shadow-[0_5px_15px_rgba(239,68,68,0.4)] transition-all flex flex-col items-center justify-center">
                        <span class="leading-none">B</span><span class="text-[10px] opacity-50 mt-1 hidden md:block">Key: B</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-5">
            <div class="grid grid-cols-2 gap-3 shrink-0">
                <div class="bg-slate-800/80 p-4 md:p-5 rounded-2xl border border-slate-700/50 flex flex-col justify-center items-center shadow-sm">
                    <p class="text-xs text-gray-400 uppercase tracking-wider">กำไรขอนนี้</p>
                    <p id="pnl-text" class="text-3xl md:text-4xl font-bold text-white leading-tight mt-2">0 ฿</p>
                </div>
                <div class="bg-slate-800/80 p-4 md:p-5 rounded-2xl border border-slate-700/50 flex flex-col justify-between shadow-sm">
                    <div class="flex justify-between items-end">
                        <p class="text-xs text-gray-400 uppercase tracking-wider">ยอดรวม</p>
                        <p id="global-pnl-text" class="text-xl md:text-2xl font-bold text-gray-200 leading-tight">0 ฿</p>
                    </div>
                    <div class="flex justify-between text-xs text-gray-300 mt-3 pt-3 border-t border-slate-600/50">
                        <span>สเตป: <b id="step-text" class="text-white text-sm">1</b></span>
                        <span>ไม้: <b id="loss-streak-text" class="text-white text-sm">1</b></span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-2 shrink-0">
                <button onclick="undo()" class="bg-slate-700 hover:bg-slate-600 py-3 rounded-xl text-white shadow-sm border border-slate-600 text-xs md:text-sm font-semibold transition-colors flex items-center justify-center gap-1">↩️ ย้อน</button>
                <button onclick="executeShoeReset('NO_DATA')" class="bg-gray-800 hover:bg-gray-700 py-3 rounded-xl text-gray-300 text-xs md:text-sm border border-gray-600 transition-colors shadow-sm">🧹 ล้าง</button>
                <button onclick="newShoe()" class="bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl text-white shadow-md text-xs md:text-sm font-bold transition-colors">🔄 จบขอน</button>
                <button onclick="triggerSync()" id="sync-btn" class="bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl text-white font-bold text-[10px] md:text-xs border border-emerald-500 flex flex-col items-center justify-center transition-colors shadow-md">
                    <span class="leading-none mb-0.5">☁️ Sync</span>
                    <span id="db-count" class="leading-none text-white/80">0</span>
                </button>
            </div>
            
            <div id="sync-error-box" class="w-full bg-red-900/50 border border-red-500 text-red-300 text-[10px] p-2 rounded-lg hidden font-mono break-words"></div>
            
            <div class="flex gap-2">
                 <button onclick="exportCSV()" class="w-full bg-slate-800 hover:bg-slate-700 py-2 rounded-xl text-gray-400 font-bold text-[11px] border border-slate-700 transition-colors shadow-sm">📥 ดาวน์โหลด Backup CSV (Offline)</button>
            </div>

            <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700/50 shadow-inner overflow-x-auto overflow-y-hidden no-scrollbar flex-1 min-h-[200px]">
                <p class="text-xs text-gray-500 mb-2 font-medium pl-1">กระดานลูกปัด</p>
                <div id="history-container" class="bead-plate-grid w-max mx-auto md:mx-0"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 🔑 1. ข้อมูล SUPABASE ของคุณ
    // ==========================================
    const SUPABASE_URL = "https://agikitrsnjlzjrjpgedi.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_iawwyr1Ncgrx_5y6BfZ2ng_4GCmnNI7"; 

    function vibrate(duration) { if (navigator.vibrate) navigator.vibrate(duration); }

    const CONFIG = {
        'WHALE_V1': { tiers: [[100, 200, 400], [800, 1600, 3200, 6400]], tp: 500, sl: -99999, lockdown_round: 45, use_dragon_wait: true, use_toxic_v2: false, use_v3_shield: false },
        'WHALE_V2': { tiers: [[100, 200, 400], [800, 1600, 3200, 6400]], tp: 500, sl: -99999, lockdown_round: 45, use_dragon_wait: true, use_toxic_v2: true, use_v3_shield: false },
        'WHALE_V3': { tiers: [[100, 200, 400], [800, 1600, 3200, 6400]], tp: 500, sl: -99999, lockdown_round: 45, use_dragon_wait: true, use_toxic_v2: true, use_v3_shield: true } 
    };

    let shoe_database = []; 
    let sync_queue = []; 
    let mode = 'WHALE_V3'; let global_history_log = []; let state, initial_shoe_state;
    let keepCarryoverGlobal = false;
    const STORAGE_KEY = 'killerBaccaratData_V16_SyncDB';

    document.addEventListener('keydown', function(event) {
        const key = event.key.toLowerCase();
        if (key === 'p') { vibrate(50); recordResult('P'); }
        else if (key === 'b') { vibrate(50); recordResult('B'); }
        else if (key === 't') { vibrate(50); recordResult('T'); }
        else if (key === 'z') { vibrate(50); undo(); }
    });

    function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ mode, global_history_log, state, initial_shoe_state, shoe_database, sync_queue })); }
    
    function loadFromStorage() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            try {
                const parsed = JSON.parse(data); mode = parsed.mode; global_history_log = parsed.global_history_log || [];
                shoe_database = parsed.shoe_database || []; 
                sync_queue = parsed.sync_queue || [];
                state = parsed.state; initial_shoe_state = parsed.initial_shoe_state; return true;
            } catch(e) { return false; }
        } return false;
    }

    function hardResetData() { 
        vibrate(50); 
        if(confirm("⚠️ ล้างความจำระบบทั้งหมด (รวมถึงคิวที่รอ Sync ด้วย)! ยืนยันหรือไม่?")) { 
            localStorage.removeItem(STORAGE_KEY); window.location.reload(); 
        } 
    }

    // 💥 ฟังก์ชันส่งข้อมูลขึ้น Supabase (แก้บั๊กการจับคู่ Payload)
    async function triggerSync() {
        let countEl = document.getElementById('db-count');
        let btnEl = document.getElementById('sync-btn');
        let errorBox = document.getElementById('sync-error-box');
        
        if (sync_queue.length === 0) {
            countEl.innerText = "OK";
            btnEl.className = "px-4 bg-emerald-600 py-3 rounded-xl text-white font-bold text-xs border border-emerald-500 shadow-md flex flex-col items-center justify-center";
            errorBox.classList.add('hidden');
            return;
        }

        countEl.innerText = "Syncing...";
        if (!SUPABASE_URL.includes("supabase.co")) return;

        try {
            // แพ็ก Payload แบบบังคับชื่อให้ตรงตาราง 100%
            const payload = sync_queue.map(record => ({
                shoe_id: record.shoe_id,
                round_no: record.round_no,
                actual: record.actual,
                signal: record.signal,
                bet_amount: record.bet_amount,
                pnl: record.pnl,
                net_profit: record.net_profit,
                recorded_time: record.recorded_time,
                shoe_tag: record.shoe_tag,
                outcome: record.outcome
            }));

            const response = await fetch(`${SUPABASE_URL}/rest/v1/baccarat_round_logs`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify(payload) 
            });
            
            if (!response.ok) {
                let errText = await response.text();
                throw new Error(errText); // โยน Error ไปเข้า Catch
            } else {
                console.log(`☁️ Synced ${sync_queue.length} rounds successfully!`);
                sync_queue = []; // ส่งสำเร็จล้างคิวทิ้ง
                saveToStorage(); 
                countEl.innerText = "OK";
                btnEl.className = "px-4 bg-emerald-600 py-3 rounded-xl text-white font-bold text-xs border border-emerald-500 shadow-md flex flex-col items-center justify-center";
                errorBox.classList.add('hidden'); // ซ่อนกล่อง Error
            }
        } catch (error) {
            console.error("Sync Error:", error);
            countEl.innerText = `ค้าง ${sync_queue.length}`;
            btnEl.className = "px-4 bg-red-600 py-3 rounded-xl text-white font-bold text-xs border border-red-500 shadow-md flex flex-col items-center justify-center";
            
            // 💥 แสดง Error ให้เห็นชัดๆ ว่า Supabase ด่าว่าอะไร
            errorBox.classList.remove('hidden');
            errorBox.innerText = `🚨 Supabase Error: ${error.message}`;
        }
    }

    // ฟังก์ชันจำลองประวัติเป็นรายตา
    function generateRoundLogs(shoe_id, outcome_cat) {
        let logs = []; let temp_state = JSON.parse(JSON.stringify(initial_shoe_state)); 
        let now = new Date(); let pad = (n) => n.toString().padStart(2, '0');
        let timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

        for (let i = 0; i < global_history_log.length; i++) {
            let outcome = global_history_log[i]; let pre_state = JSON.parse(JSON.stringify(temp_state)); 
            
            let signal = pre_state.current_signal || 'WAIT';
            if (pre_state.toxic_wait || pre_state.dragon_wait || pre_state.symmetry_wait || !pre_state.active_shoe) signal = 'WAIT';
            if (pre_state.is_virtual_mode && signal !== 'WAIT') signal = 'VIRTUAL ' + signal;
            
            let bet = pre_state.bet_amount || 0;
            processOutcomeOnState(temp_state, outcome, mode); 
            let pnl_diff = temp_state.global_pnl - pre_state.global_pnl;
            
            // โครงสร้างที่ตรงกับ Supabase 100%
            logs.push({
                shoe_id: shoe_id, 
                round_no: i + 1, 
                actual: outcome, 
                signal: signal, 
                bet_amount: bet, 
                pnl: pnl_diff,
                net_profit: temp_state.global_pnl, 
                recorded_time: timeStr, 
                shoe_tag: "NO_TAG", 
                outcome: outcome_cat 
            });
        }
        return logs;
    }

    function exportCSV() {
        vibrate(30);
        if (shoe_database.length === 0 && sync_queue.length === 0) {
            alert("ยังไม่มีข้อมูลขอนไพ่ให้ดาวน์โหลดครับ"); return;
        }
        
        let csvContent = "\uFEFF"; 
        let rows = [["Shoe_ID", "Round_No", "Actual", "Signal", "Bet_Amount", "PnL", "Net_Profit", "Recorded_Time", "Outcome"]];
        
        let dataToExport = sync_queue.length > 0 ? sync_queue : shoe_database;
        dataToExport.forEach(item => {
            rows.push([item.shoe_id, item.round_no, item.actual, item.signal, item.bet_amount, item.pnl, item.net_profit, item.recorded_time, item.outcome]);
        });

        csvContent += rows.map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob); const link = document.createElement("a");
        link.setAttribute("href", url); link.setAttribute("download", `Killer_Baccarat_Rounds_${new Date().getTime()}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function getInitialState(keepCarryover = false) {
        let base_tiers = JSON.parse(JSON.stringify(CONFIG[mode].tiers)); let final_tiers = base_tiers;
        let initial_global_pnl = 0, initial_current_tier = 0, initial_loss_streak = 0, initial_global_losses = 0;
        if (keepCarryover && typeof state !== 'undefined' && state) {
            initial_global_pnl = state.global_pnl; initial_current_tier = state.current_tier; initial_loss_streak = state.loss_streak;
            initial_global_losses = state.global_consecutive_losses;
            final_tiers = JSON.parse(JSON.stringify(state.active_tiers)); 
            if (initial_current_tier === 1) {
                let remaining_bullets = final_tiers[1].length - initial_loss_streak;
                while (remaining_bullets < 3) { let last_bet = final_tiers[1][final_tiers[1].length - 1]; final_tiers[1].push(last_bet * 2); remaining_bullets = final_tiers[1].length - initial_loss_streak; }
            }
        }
        return {
            history_all: [], history: [], pnl: 0, global_pnl: initial_global_pnl, current_tier: initial_current_tier, loss_streak: initial_loss_streak, active_tiers: final_tiers, 
            current_signal: null, current_dna: "---", bet_amount: null, active_shoe: true, status_msg: "ดูลาดเลา...", status_color: "text-gray-300", 
            dragon_wait: false, dragon_color: null, symmetry_wait: false, toxic_wait: false, toxic_msg: "", regime_display: "Balanced", last_bet_won: false, is_riding_dragon: false, riding_color: null,
            is_virtual_mode: false, is_trailing: false, global_consecutive_losses: initial_global_losses, is_blowout: false, genesis_checked: false, genesis_status: null
        };
    }

    if (!loadFromStorage()) { state = getInitialState(false); initial_shoe_state = JSON.parse(JSON.stringify(state)); }

    function rebuildStateFromLog(mode_to_run, log_array) { let temp_state = JSON.parse(JSON.stringify(initial_shoe_state)); for (let out of log_array) { processOutcomeOnState(temp_state, out, mode_to_run); } return temp_state; }

    function setMode(newMode) { if (mode === newMode) return; vibrate(30); mode = newMode; state = rebuildStateFromLog(mode, global_history_log); saveToStorage(); renderUI(); }

    function getStreakLengths(hist) { if(hist.length === 0) return []; let streaks = [], current = 1; for(let i=1; i<hist.length; i++){ if(hist[i] === hist[i-1]) current++; else { streaks.push(current); current = 1; } } streaks.push(current); return streaks; }
    function buildBigRoad(actual_list) { let br = []; for (let out of actual_list) { if (out !== 'B' && out !== 'P') continue; if (br.length === 0) br.push([out]); else if (out === br[br.length - 1][0]) br[br.length - 1].push(out); else br.push([out]); } return br; }

    function applyV3Shield(history, dna) {
        if (!history || history.length < 4) return false;
        let streak = 1; let lastOutcome = history[history.length - 1]; 
        for (let i = history.length - 2; i >= 0; i--) { if (history[i] === lastOutcome) streak++; else break; }
        if (streak === 4 && (dna === "RRR" || dna === "BBB")) return true; 
        return false; 
    }

    function get3RoadsColor(hist, next_bet) {
        let br = buildBigRoad([...hist, next_bet]), colors = []; if (br.length === 0) return "---";
        for (let k of [1, 2, 3]) {
            let c = br.length - 1, r = br[c].length - 1, color = '-';
            if (r === 0) { if (c < k + 1) { colors.push('-'); continue; } color = (br[c - 1].length === br[c - (k + 1)].length) ? 'R' : 'B'; } 
            else { if (c < k) { colors.push('-'); continue; } if (br[c - k].length > r) color = 'R'; else if (br[c - k].length === r) color = 'B'; else color = 'R'; }
            colors.push(color);
        } return colors.join('').length === 3 ? colors.join('') : "---";
    }

    function evaluateSignal(s) {
        let hist = s.history, len = hist.length; if (len < 5) return null; 
        let window_size = 15; let recent_hist = hist.slice(-window_size); let w_len = recent_hist.length; let b_cnt = recent_hist.filter(x=>x==='B').length; let p_cnt = w_len - b_cnt;
        let regime = "Balanced"; if (w_len >= 10) { if (p_cnt / w_len >= 0.55) regime = "P-Dom"; else if (b_cnt / w_len >= 0.55) regime = "B-Dom"; } s.regime_display = regime; 
        let occ3=0, occ4=0, occ5=0, streak=1; for (let j = len - 2; j >= 0; j--) { if (hist[j] === hist[len - 1]) streak++; else break; }
        let tmpStr = 1; for(let i=0; i<len; i++) { if(i>0 && hist[i]===hist[i-1]) tmpStr++; else tmpStr=1; if(tmpStr===3) occ3++; if(tmpStr===4) occ4++; if(tmpStr===5) occ5++; }
        let dna = get3RoadsColor(hist, hist[len - 1]), opp = hist[len - 1] === 'B' ? 'P' : 'B', sig = null;
        if (streak >= 5) { if (occ5 === 1) sig = opp; else if (occ5 === 2 && ['RRR', 'RBR'].includes(dna)) sig = hist[len-1]; else if (occ5 === 3 && ['RRB', 'BRR', 'RRR'].includes(dna)) sig = hist[len-1]; } 
        else if (streak === 4 && !sig) { if (occ4 === 1 && regime !== 'P-Dom') sig = hist[len-1]; else if (occ4 === 2 && ['BRR', 'RRB'].includes(dna)) sig = opp; else if (occ4 === 3) sig = hist[len-1]; } 
        else if (streak === 3 && !sig) { if (occ3 === 1) sig = hist[len-1]; else if (occ3 === 2 && ['BRR', 'RBR'].includes(dna)) sig = hist[len-1]; else if (occ3 === 3 && ['RBR', 'BRR', 'RBB'].includes(dna)) sig = opp; } 
        else if (!sig && len>=4 && hist[len-1] === hist[len-2] && hist[len-3] === hist[len-4] && hist[len-1] !== hist[len-3]) { if (regime === 'P-Dom' && ['RBR', 'BRR'].includes(dna)) sig = opp; else if (regime === 'Balanced') sig = hist[len-1]; } 
        else if (!sig && streak === 2) { if (regime === 'Balanced' && !['BRR', 'BBR'].includes(dna)) sig = hist[len-1]; }
        return sig;
    }

    function processOutcomeOnState(s, outcome, run_mode) {
        let cfg = CONFIG[run_mode];
        if (s.active_shoe) {
            if (s.current_signal && outcome !== 'T') {
                let is_win = (outcome === s.current_signal); let amt = s.bet_amount;
                if (s.is_virtual_mode && amt === 0) { if (is_win) s.is_virtual_mode = false; } 
                else if (amt > 0) {
                    s.last_bet_won = is_win; 
                    if (is_win) { s.pnl += amt; s.global_pnl += amt; s.loss_streak = 0; s.current_tier = 0; s.global_consecutive_losses = 0; if (s.pnl >= cfg.tp) s.is_trailing = true; } 
                    else {
                        s.pnl -= amt; s.global_pnl -= amt; s.loss_streak++; s.global_consecutive_losses++; 
                        if (s.is_trailing) { s.active_shoe = false; s.status_msg = `🏆 ล็อกกำไร`; s.status_color = "text-green-400"; s.bet_amount = null; s.current_dna = "---"; } 
                        else {
                            if (s.is_riding_dragon) s.is_riding_dragon = false;
                            let strk = 1; for(let j=s.history.length-2; j>=0; j--){ if(s.history[j]===s.history[s.history.length-1]) strk++; else break;}
                            if (strk >= 4) { s.dragon_wait = true; s.dragon_color = s.history[s.history.length-1]; }
                            let max_losses = s.active_tiers[s.current_tier].length;
                            if (s.loss_streak >= max_losses) {
                                s.loss_streak = 0; if (s.current_tier < s.active_tiers.length - 1) { s.current_tier++; } 
                                else { s.current_tier = 0; s.active_shoe = false; s.is_blowout = true; s.status_msg = `💥 พอร์ตแตก ย้ายขอน!`; s.status_color = "text-red-500"; s.bet_amount = null; s.current_dna = "---"; }
                            }
                        }
                    }
                }
            } else if (outcome !== 'T') { if (!s.is_virtual_mode) s.last_bet_won = false; }
        }
        s.history_all.push(outcome); if (outcome === 'B' || outcome === 'P') s.history.push(outcome);
    }

    function recordResult(outcome) { vibrate(50); global_history_log.push(outcome); state = rebuildStateFromLog(mode, global_history_log); saveToStorage(); renderUI(); }
    function undo() { vibrate(50); if (global_history_log.length > 0) { global_history_log.pop(); state = rebuildStateFromLog(mode, global_history_log); saveToStorage(); renderUI(); } }

    function executeShoeReset(type = "NORMAL") {
        if(type === "NO_DATA" && !confirm("ยืนยันการล้างกระดานโดยไม่บันทึกข้อมูล?")) return;
        state = getInitialState(keepCarryoverGlobal); initial_shoe_state = JSON.parse(JSON.stringify(state)); 
        global_history_log = []; current_shoe_genesis_dna = ""; saveToStorage(); renderUI();
    }

    function newShoe() {
        vibrate(50); keepCarryoverGlobal = false;
        
        let outcome_category = "3_LOSS_OR_STUCK";
        let tp_limit = CONFIG[mode].tp;
        if (state.is_blowout) outcome_category = "4_BLOWOUT"; 
        else if (state.pnl >= tp_limit) outcome_category = "1_TP_ACHIEVED"; 
        else if (state.pnl > 0) outcome_category = "2_PROFIT"; 
        else if (state.pnl === 0) outcome_category = "0_NO_TRADE";

        if (state.loss_streak > 0 || state.current_tier > 0) {
            if (state.global_pnl < 0) { keepCarryoverGlobal = confirm("ติดสเตปทบเงิน! ต้องการ 'ยกยอดข้ามขอน' หรือไม่?"); } 
            else { if (!confirm("จบกำไร! ระบบจะล้างไม้ที่ค้างอยู่ ยืนยันเริ่มขอนใหม่?")) return; keepCarryoverGlobal = false; }
        } else { if (!confirm("จบขอนและ Sync ข้อมูลขึ้นคลาวด์?")) return; }
        
        if (global_history_log.length > 0) {
            let now = new Date(); let pad = (n) => n.toString().padStart(2, '0');
            let dateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
            let timeStr = `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            let shoe_id = `SHOE_${dateStr}_${timeStr}`;
            
            let logsArray = generateRoundLogs(shoe_id, outcome_category); 
            shoe_database = shoe_database.concat(logsArray); 
            sync_queue = sync_queue.concat(logsArray); 
            triggerSync(); 
        }
        executeShoeReset();
    }

    function renderUI() {
        document.getElementById('btn-whale1').className = mode === 'WHALE_V1' ? "px-4 py-2 rounded-full text-[11px] md:text-sm font-bold bg-yellow-600 text-white shadow-md transition-all" : "px-4 py-2 rounded-full text-[11px] md:text-sm font-semibold text-gray-400 hover:text-white transition-all";
        document.getElementById('btn-whale2').className = mode === 'WHALE_V2' ? "px-4 py-2 rounded-full text-[11px] md:text-sm font-bold bg-fuchsia-600 text-white shadow-md transition-all" : "px-4 py-2 rounded-full text-[11px] md:text-sm font-semibold text-gray-400 hover:text-white transition-all";
        document.getElementById('btn-whale3').className = mode === 'WHALE_V3' ? "px-4 py-2 rounded-full text-[11px] md:text-sm font-bold bg-red-600 text-white shadow-md transition-all" : "px-4 py-2 rounded-full text-[11px] md:text-sm font-semibold text-gray-400 hover:text-white transition-all";
        
        document.getElementById('mode-badge').innerText = mode === 'WHALE_V1' ? "🐋 Whale V.1" : mode === 'WHALE_V2' ? "🐉 Whale V.2" : "🐦‍🔥 Phoenix V.3";

        const commanderZone = document.getElementById('commander-zone');
        let cmdClass = "w-full rounded-3xl p-4 md:p-6 border-2 text-center shadow-2xl shrink-0 transition-colors duration-300 fixed-commander-mobile ";
        if (state.current_signal && state.bet_amount > 0 && !state.is_virtual_mode && state.active_shoe) {
            if (state.current_signal === 'B') cmdClass += "border-red-500 bg-red-900/20 shadow-[0_0_20px_rgba(239,68,68,0.2)]";
            else cmdClass += "border-blue-500 bg-blue-900/20 shadow-[0_0_20px_rgba(59,130,246,0.2)]";
        } else if (state.is_virtual_mode || (state.current_signal && state.bet_amount === 0)) { cmdClass += "border-gray-400 bg-slate-700/50"; } 
        else if (!state.active_shoe) { if (state.is_blowout) cmdClass += "border-red-600 bg-red-950/50"; else cmdClass += "border-green-500 bg-green-900/20"; } 
        else { cmdClass += "border-slate-600 bg-slate-800/80"; }
        commanderZone.className = cmdClass;

        const sigText = document.getElementById('signal-text');
        sigText.innerText = state.status_msg; 
        sigText.className = `font-sarabun text-2xl sm:text-3xl md:text-4xl font-bold tracking-normal leading-none transition-colors whitespace-nowrap overflow-hidden text-ellipsis w-full ${state.status_color}`;
        
        const dnaContainer = document.getElementById('dna-container'), dnaDots = document.getElementById('dna-dots');
        if (state.current_signal && state.current_dna && state.current_dna !== "---") {
            dnaContainer.classList.remove('hidden'); let dotsHtml = '';
            for(let char of state.current_dna) {
                if (char === 'R') dotsHtml += '<span class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-sm border border-red-700"></span>';
                else if (char === 'B') dotsHtml += '<span class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-sm border border-blue-700"></span>';
                else dotsHtml += '<span class="text-gray-500 text-[9px] px-0.5">-</span>';
            }
            dnaDots.innerHTML = dotsHtml;
        } else { dnaContainer.classList.add('hidden'); }
        
        let regime_text = state.regime_display === "P-Dom" ? "🔵 P-Dom" : state.regime_display === "B-Dom" ? "🔴 B-Dom" : "⚖️ Balanced";
        document.getElementById('market-regime').innerText = `ตลาด: ${regime_text}`;

        document.getElementById('pnl-text').innerText = (state.pnl > 0 ? "+" : "") + state.pnl + " ฿";
        document.getElementById('pnl-text').className = `text-3xl md:text-4xl font-bold text-white leading-tight mt-2 ${state.pnl > 0 ? 'text-green-400' : (state.pnl < 0 ? 'text-red-400' : 'text-white')}`;
        document.getElementById('global-pnl-text').innerText = (state.global_pnl > 0 ? "+" : "") + state.global_pnl + " ฿";
        document.getElementById('global-pnl-text').className = `text-xl md:text-2xl font-bold text-gray-200 leading-tight ${state.global_pnl > 0 ? 'text-green-400' : (state.global_pnl < 0 ? 'text-red-400' : 'text-gray-200')}`;
        document.getElementById('step-text').innerText = state.current_tier + 1;
        document.getElementById('loss-streak-text').innerText = state.loss_streak + 1;
        document.getElementById('round-text').innerText = state.history_all.length;
        
        const histContainer = document.getElementById('history-container'); histContainer.innerHTML = '';
        state.history_all.forEach((out, index) => {
            let div = document.createElement('div'); 
            div.className = `w-[26px] h-[26px] rounded-full flex items-center justify-center text-[12px] font-bold bead-${out.toLowerCase()}`;
            if (index === state.history_all.length - 1) div.classList.add('latest-bead');
            div.innerText = out; histContainer.appendChild(div);
        });
        const scrollZone = histContainer.parentElement; scrollZone.scrollLeft = scrollZone.scrollWidth;
        
        let sysInfo = "✅ พร้อมรบ";
        if(state.is_blowout) sysInfo = "💥 พอร์ตแตก!"; else if(state.current_signal && state.status_msg.includes("มังกรลวง")) sysInfo = "🔥 เกราะ V.3"; else if(state.is_virtual_mode) sysInfo = "👻 แทงลม"; else if(state.is_trailing) sysInfo = "🚀 ปล่อยไหล"; else if(state.is_riding_dragon) sysInfo = "🔥 ขี่มังกร"; else if(state.symmetry_wait) sysInfo = "🟣 ป้องกันไพ่คู่"; else if(state.dragon_wait) sysInfo = "🐉 รอมังกรขาด";
        if(!state.active_shoe) sysInfo = "🛑 จบขอนแล้ว";
        document.getElementById('system-status').innerText = sysInfo;
        
        let syncBtn = document.getElementById('sync-btn');
        let countEl = document.getElementById('db-count');
        if(sync_queue.length > 0) {
            countEl.innerText = `ค้าง ${sync_queue.length}`;
            syncBtn.className = "px-4 bg-red-600 hover:bg-red-500 py-3 rounded-xl text-white font-bold text-[10px] md:text-xs border border-red-500 transition-colors shadow-md flex flex-col items-center justify-center";
        } else {
            countEl.innerText = "OK";
            syncBtn.className = "px-4 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl text-white font-bold text-[10px] md:text-xs border border-emerald-500 transition-colors shadow-md flex flex-col items-center justify-center";
        }
    }
    
    loadFromStorage();
    renderUI();
    if(sync_queue.length > 0) triggerSync(); 
</script>
